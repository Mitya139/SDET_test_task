name: UI Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  changelists-settings:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    env:
      JAVA_TOOL_OPTIONS: -Djava.awt.headless=false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run UI test
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24 -ac +extension RANDR" ./gradlew test --no-daemon --stacktrace
